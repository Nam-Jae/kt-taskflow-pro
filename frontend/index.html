<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow Pro</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>

  <!-- FOUC 방지: 첫 페인트 전 테마 클래스 적용 -->
  <script>
    (function () {
      var stored = localStorage.getItem('theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (stored === 'dark' || (!stored && prefersDark)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
</head>

<body class="font-sans min-h-screen bg-gradient-to-br from-gray-100 to-slate-200 dark:from-gray-950 dark:to-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-200">

  <!-- 헤더 -->
  <header class="sticky top-0 z-10 backdrop-blur-md bg-white/70 dark:bg-gray-900/70 border-b border-gray-200/50 dark:border-gray-700/50">
    <div class="max-w-5xl mx-auto px-4 h-14 flex items-center justify-between">
      <h1 class="text-base font-semibold tracking-tight">TaskFlow Pro</h1>
      <button
        id="themeToggle"
        onclick="toggleTheme()"
        class="min-h-[44px] min-w-[44px] flex items-center justify-center rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors text-xl"
        aria-label="테마 전환"
      ><span id="themeIcon"></span></button>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-6">

    <!-- 추가 폼 -->
    <section class="mb-6">
      <div class="rounded-xl shadow-lg bg-white/90 dark:bg-gray-800/90 backdrop-blur-md p-5">
        <p class="text-xs font-medium text-gray-400 dark:text-gray-500 mb-3 uppercase tracking-wide">새 태스크</p>
        <form id="addForm" autocomplete="off">
          <div class="flex flex-col gap-3">
            <input
              id="newTitle" type="text"
              placeholder="태스크 이름 (필수)" maxlength="200" required
              class="w-full rounded-xl border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2.5 text-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 min-h-[44px]"
            >
            <div class="flex flex-col sm:flex-row gap-2">
              <input
                id="newDueAt" type="datetime-local"
                class="flex-1 rounded-xl border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 min-h-[44px]"
              >
              <select
                id="newStatus"
                class="sm:w-36 rounded-xl border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 min-h-[44px]"
              >
                <option value="todo">Todo</option>
                <option value="in_progress">In Progress</option>
                <option value="done">Done</option>
              </select>
              <button
                type="submit" id="addBtn"
                class="rounded-xl bg-blue-500 hover:bg-blue-600 active:bg-blue-700 text-white text-sm font-medium px-5 py-2.5 min-h-[44px] transition-colors disabled:opacity-50"
              >+ 추가</button>
            </div>
            <p id="addError" class="hidden text-red-500 text-xs"></p>
          </div>
        </form>
      </div>
    </section>

    <!-- 태스크 목록 -->
    <section>
      <div id="emptyState" class="hidden text-center py-20 text-gray-400 dark:text-gray-600">
        <div class="text-5xl mb-3">📋</div>
        <p class="text-sm">등록된 태스크가 없습니다</p>
        <p class="text-xs mt-1">위에서 첫 태스크를 추가해보세요</p>
      </div>
      <div id="taskList" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    </section>
  </main>

  <!-- 수정 모달 -->
  <div
    id="modalOverlay"
    class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm"
    onclick="closeModal()"
  >
    <div
      class="w-full max-w-md rounded-xl shadow-2xl bg-white dark:bg-gray-800 p-6"
      onclick="event.stopPropagation()"
    >
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-sm font-semibold">태스크 수정</h2>
        <button
          onclick="closeModal()"
          class="min-h-[44px] min-w-[44px] flex items-center justify-center rounded-xl hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-400 transition-colors"
          aria-label="닫기"
        >✕</button>
      </div>
      <form id="editForm" autocomplete="off">
        <div class="flex flex-col gap-3">
          <input
            id="editTitle" type="text"
            placeholder="태스크 이름 (필수)" maxlength="200" required
            class="w-full rounded-xl border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 min-h-[44px]"
          >
          <textarea
            id="editDescription" placeholder="설명 (선택)" rows="3"
            class="w-full rounded-xl border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"
          ></textarea>
          <input
            id="editDueAt" type="datetime-local"
            class="w-full rounded-xl border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 min-h-[44px]"
          >
          <select
            id="editStatus"
            class="w-full rounded-xl border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 min-h-[44px]"
          >
            <option value="todo">Todo</option>
            <option value="in_progress">In Progress</option>
            <option value="done">Done</option>
          </select>
          <p id="editError" class="hidden text-red-500 text-xs"></p>
          <div class="flex gap-2 justify-end mt-1">
            <button
              type="button" id="cancelBtn"
              class="rounded-xl border border-gray-200 dark:border-gray-600 px-4 py-2.5 text-sm min-h-[44px] hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors"
            >취소</button>
            <button
              type="submit" id="saveBtn"
              class="rounded-xl bg-blue-500 hover:bg-blue-600 text-white text-sm font-medium px-5 py-2.5 min-h-[44px] transition-colors disabled:opacity-50"
            >저장</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
